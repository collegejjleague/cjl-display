    if (nr !== lastTimerRunning) { lastTimerRunning=nr; if (nr) startTimer(); else stopTimer(); }
    render();
  }
  function startTimer() {
    if (timerInterval) return;
    timerInterval = setInterval(function() {
      if (state.timerSeconds > 0) { state.timerSeconds--; renderTimer(); }
      else { clearInterval(timerInterval); timerInterval=null; }
    }, 1000);
  }
  function stopTimer() { clearInterval(timerInterval); timerInterval=null; }
  
  // Auto-scale athlete name font size to fit the box width.
  // Measures text width using a canvas (independent of flex/overflow layout).
  var __measureCanvas = null;
  function measureTextWidth(text, fontSize, fontWeight, fontFamily, letterSpacing) {
    if (!__measureCanvas) __measureCanvas = document.createElement('canvas');
    var ctx = __measureCanvas.getContext('2d');
    ctx.font = fontWeight + ' ' + fontSize + 'px ' + fontFamily;
    var base = ctx.measureText(text).width;
    // Approximate letter-spacing contribution (applied between characters)
    var extra = letterSpacing * Math.max(0, text.length - 1);
    return base + extra;
  }
  function autoScaleName(id, text) {
    var el = document.getElementById(id);
    var maxFont = 37;
    var minFont = 18;
    var boxWidth = 290.17;
    var width = measureTextWidth(text || '', maxFont, '900', "'Barlow Condensed', sans-serif", 1.5);
    if (width > boxWidth) {
      var scale = boxWidth / width;
      var newSize = Math.max(minFont, Math.floor(maxFont * scale));
      el.style.fontSize = newSize + 'px';
    } else {
      el.style.fontSize = maxFont + 'px';
    }
  }

  function render() {
    document.getElementById('name1').textContent = state.name1;
    document.getElementById('name2').textContent = state.name2;
    autoScaleName('name1', state.name1);
    autoScaleName('name2', state.name2);
    document.getElementById('school1').textContent = state.school1;
    document.getElementById('school2').textContent = state.school2;
    document.getElementById('bar1').style.background = state.color1;
    document.getElementById('bar2').style.background = state.color2;
    document.getElementById('team1_bg').style.background = state.color1;
    document.getElementById('team2_bg').style.background = state.color2;
    document.getElementById('team1_name').textContent = state.school1;
    document.getElementById('team2_name').textContent = state.school2;
    document.getElementById('pts_red').textContent = state.pts1;
    document.getElementById('pts_blue').textContent = state.pts2;
    document.getElementById('team1_score').textContent = state.teamPts1;
    document.getElementById('team2_score').textContent = state.teamPts2;
    var total = state.mode==='womens'?3:5;
    document.getElementById('match_counter').textContent =
      state.mode==='supermatch' ? 'Supermatch' : 'Match '+state.matchNum+' of '+total;
    renderTimer();
    document.body.className = state.mode==='supermatch'?'supermatch':'';
  }
  function renderTimer() {
    var m=Math.floor(state.timerSeconds/60), s=state.timerSeconds%60;
    var el=document.getElementById('timer');
    el.textContent = m+':'+s.toString().padStart(2,'0');
    el.className = 'el'+(state.timerSeconds<=10?' danger':'');
  }
  render();

  // Boot: start sheet poll immediately, then connect WS (stops poll when ready)
  sheetPollInterval = setInterval(pollSheet, 2000);
  pollSheet();
  connectWS();

  // Keepalive ping every 25 seconds to prevent Render dropping the connection
  setInterval(function() {
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({ type: 'ping' }));
    }
  }, 25000);

</script>
