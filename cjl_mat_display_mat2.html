<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CJL Mat 2 Display</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100vw;height:100vh;background:#111;font-family:'Barlow Condensed',sans-serif;color:#fff;overflow:hidden;}
.wrapper{width:100%;height:100%;display:flex;flex-direction:column;padding:16px 20px;gap:8px;}
.top-bar{display:flex;align-items:center;justify-content:space-between;}
.logo-area{display:flex;align-items:center;gap:12px;}
.logo-area img{height:48px;opacity:0.85;}
.mat-label{font-size:16px;font-weight:600;color:#666;letter-spacing:3px;text-transform:uppercase;font-family:'Barlow',sans-serif;}
.match-label{text-align:center;font-size:18px;font-weight:600;color:#888;letter-spacing:3px;text-transform:uppercase;font-family:'Barlow',sans-serif;}
.connection-status{font-size:14px;font-weight:600;color:#e24b4a;letter-spacing:2px;font-family:'Barlow',sans-serif;transition:color 0.3s;}
.main-grid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:24px;min-height:0;}
.team-card{display:flex;flex-direction:column;border:2px solid rgba(255,255,255,0.05);border-radius:16px;padding:24px;justify-content:space-between;min-height:0;transition:background 0.5s, border-color 0.5s;}
.athlete-info{display:flex;flex-direction:column;gap:4px;}
.athlete-name{font-size:72px;font-weight:900;line-height:1.05;text-transform:uppercase;letter-spacing:-1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.school-name{font-size:28px;font-weight:500;color:#aaa;text-transform:uppercase;letter-spacing:1px;font-family:'Barlow',sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.score-area{display:flex;align-items:baseline;justify-content:space-between;margin-top:auto;}
.points{font-size:240px;font-weight:900;line-height:0.8;letter-spacing:-6px;}
.indicators{display:flex;flex-direction:column;gap:16px;align-items:flex-end;margin-bottom:20px;}
.indicator-group{display:flex;align-items:center;gap:12px;}
.ind-label{font-size:14px;font-weight:600;color:#666;letter-spacing:2px;text-transform:uppercase;font-family:'Barlow',sans-serif;width:40px;text-align:right;}
.dots{display:flex;gap:8px;}
.dot{width:16px;height:16px;border-radius:50%;background:#222;border:2px solid #333;transition:all 0.2s;}
.dot.active{background:#ffcc00;border-color:#ffcc00;box-shadow:0 0 12px rgba(255,204,0,0.4);}
.dot.dq{background:#e24b4a;border-color:#e24b4a;box-shadow:0 0 12px rgba(226,75,74,0.4);}
.bottom-bar{display:grid;grid-template-columns:1fr 240px 1fr;align-items:center;padding:12px 0 4px 0;}
.team-total{display:flex;align-items:center;gap:16px;font-size:22px;font-weight:600;color:#aaa;}
.team-total.right{justify-content:flex-end;}
.total-label{font-size:14px;color:#555;letter-spacing:2px;text-transform:uppercase;font-family:'Barlow',sans-serif;}
.total-pts{font-size:32px;font-weight:900;color:#fff;background:#222;padding:4px 14px;border-radius:8px;min-width:50px;text-align:center;}
.timer-container{display:flex;justify-content:center;}
.timer{font-size:100px;font-weight:900;line-height:0.8;letter-spacing:-2px;text-align:center;color:#fff;min-width:220px;}
.timer.danger{color:#e24b4a;animation:pulse 1s infinite alternate;}
body.supermatch .indicator-group, body.supermatch .bottom-bar { display: none !important; }
body.supermatch .main-grid { margin-bottom: 24px; }
@keyframes pulse{from{opacity:1;}to{opacity:0.7;}}
</style>
</head>
<body>
<div class="wrapper">
  <div class="top-bar">
    <div class="logo-area">
      <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADwAAAA8CAMAAAALXilVAAAAGXRFWHRTb2Z0d2FyZQBBZG9iZSBJbWFnZVJlYWR5ccllPAAAAAZQTFRF////AAAAVcLTfgAAAAF0Uk5TAEDm2GYAAAAnSURBVHja7MExAQAAAMKg9U9tCy+gAAAAAAAAAAAAAAAAAAAAAAAAOC8CDAAfAAE9b97JAAAAAElFTkSuQmCC">
      <div class="mat-label">Mat 2</div>
    </div>
    <div class="match-label" id="matchLabel">Loading Match...</div>
    <div class="connection-status" id="connStatus">● WS</div>
  </div>

  <div class="main-grid">
    <div class="team-card" id="tc1">
      <div class="athlete-info">
        <div class="athlete-name" id="name1">—</div>
        <div class="school-name" id="school1">—</div>
      </div>
      <div class="score-area">
        <div class="points" id="pts1">0</div>
        <div class="indicators">
          <div class="indicator-group">
            <div class="ind-label">STAL</div>
            <div class="dots" id="s1"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
          </div>
          <div class="indicator-group">
            <div class="ind-label">PEN</div>
            <div class="dots" id="p1"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
          </div>
        </div>
      </div>
    </div>

    <div class="team-card" id="tc2">
      <div class="athlete-info">
        <div class="athlete-name" id="name2">—</div>
        <div class="school-name" id="school2">—</div>
      </div>
      <div class="score-area">
        <div class="points" id="pts2">0</div>
        <div class="indicators">
          <div class="indicator-group">
            <div class="ind-label">STAL</div>
            <div class="dots" id="s2"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
          </div>
          <div class="indicator-group">
            <div class="ind-label">PEN</div>
            <div class="dots" id="p2"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="team-total">
      <div class="total-label" id="tn1">TEAM</div>
      <div class="total-pts" id="tp1">0</div>
    </div>
    <div class="timer-container">
      <div class="timer" id="timer">5:00</div>
    </div>
    <div class="team-total right">
      <div class="total-pts" id="tp2">0</div>
      <div class="total-label" id="tn2">TEAM</div>
    </div>
  </div>
</div>

<script>
  const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwp2W4G2mYd5cC2e9xBgJ3S_q_3jypZiCpaxI0iF5_1f5XbdLKQQyO65OGZbBScXlddcw/exec';
  const RELAY_URL = 'wss://cjl-relay.onrender.com';
  const matId = 2;

  let state = {mode:'mens',matchNum:1,pts1:0,pts2:0,stalling1:0,stalling2:0,penalties1:0,penalties2:0,teamPts1:0,teamPts2:0,timerSeconds:300,timerRunning:false,name1:'—',school1:'—',color1:'#AA0000',name2:'—',school2:'—',color2:'#00356B'};
  
  let ws = null;
  let wsConnected = false;
  let sheetPollInterval = null;

  function stopSheetPolling() {
    if (sheetPollInterval) {
      clearInterval(sheetPollInterval);
      sheetPollInterval = null;
    }
  }

  function startSheetPolling() {
    if (sheetPollInterval || wsConnected) return;
    sheetPollInterval = setInterval(pollSheet, 10000); 
    pollSheet(); 
  }

  function connectWS() {
    try {
      if (ws) {
        try { ws.close(); } catch(e) {}
      }
      ws = new WebSocket(RELAY_URL);
      
      ws.onopen = function() {
        wsConnected = true;
        ws.send(JSON.stringify({ type: 'join', mat: matId }));
        stopSheetPolling(); 
        document.getElementById('connStatus').style.color = '#3d5af1'; 
      };
      
      ws.onmessage = function(e) {
        try { 
          var d = JSON.parse(e.data); 
          if (d.type === 'state') applyState(d); 
        } catch(err) {}
      };
      
      ws.onclose = function() {
        wsConnected = false;
        document.getElementById('connStatus').style.color = '#e24b4a'; 
        startSheetPolling(); 
        setTimeout(connectWS, 3000); 
      };
      
      ws.onerror = function() {
        wsConnected = false;
        startSheetPolling();
        setTimeout(connectWS, 3000);
      };
    } catch(e) {
      wsConnected = false;
      startSheetPolling();
      setTimeout(connectWS, 3000);
    }
  }

  async function pollSheet() {
    if (wsConnected) return; 
    try {
      const res = await fetch(SHEET_URL + '?action=getMatch&mat=' + matId, {redirect:'follow'});
      const data = JSON.parse(await res.text());
      if (data) applyState(data);
      document.getElementById('connStatus').style.color = '#27ae60'; 
    } catch(e) {}
  }

  window.addEventListener('storage', function(e) {
    if (e.key === 'cjl_mat_' + matId) {
      try { applyState(JSON.parse(e.newValue)); } catch(err) {}
    }
  });

  function applyState(data) {
    if (!data) return;
    if (data.name1 !== undefined) state.name1 = data.name1;
    if (data.name2 !== undefined) state.name2 = data.name2;
    if (data.school1 !== undefined) state.school1 = data.school1;
    if (data.school2 !== undefined) state.school2 = data.school2;
    if (data.color1 !== undefined) state.color1 = data.color1;
    if (data.color2 !== undefined) state.color2 = data.color2;
    if (data.pts1 !== undefined) state.pts1 = parseInt(data.pts1)||0;
    if (data.pts2 !== undefined) state.pts2 = parseInt(data.pts2)||0;
    if (data.teamPts1 !== undefined) state.teamPts1 = parseInt(data.teamPts1)||0;
    if (data.teamPts2 !== undefined) state.teamPts2 = parseInt(data.teamPts2)||0;
    if (data.stalling1 !== undefined) state.stalling1 = parseInt(data.stalling1)||0;
    if (data.stalling2 !== undefined) state.stalling2 = parseInt(data.stalling2)||0;
    if (data.penalties1 !== undefined) state.penalties1 = parseInt(data.penalties1)||0;
    if (data.penalties2 !== undefined) state.penalties2 = parseInt(data.penalties2)||0;
    if (data.mode !== undefined) state.mode = data.mode;
    if (data.matchNum !== undefined) state.matchNum = parseInt(data.matchNum)||1;
    
    if (data.timerSeconds !== undefined) {
      state.timerSeconds = parseInt(data.timerSeconds)||300;
    }
    
    render();
  }

  function render() {
    document.getElementById('name1').textContent = state.name1;
    document.getElementById('name2').textContent = state.name2;
    document.getElementById('school1').textContent = state.school1;
    document.getElementById('school2').textContent = state.school2;
    document.getElementById('pts1').textContent = state.pts1;
    document.getElementById('pts2').textContent = state.pts2;
    document.getElementById('tn1').textContent = state.school1;
    document.getElementById('tn2').textContent = state.school2;
    document.getElementById('tp1').textContent = state.teamPts1;
    document.getElementById('tp2').textContent = state.teamPts2;
    document.getElementById('tc1').style.background = hexRgba(state.color1, 0.12);
    document.getElementById('tc1').style.borderColor = hexRgba(state.color1, 0.3);
    document.getElementById('tc2').style.background = hexRgba(state.color2, 0.12);
    document.getElementById('tc2').style.borderColor = hexRgba(state.color2, 0.3);
    renderDots('s1', state.stalling1);
    renderDots('s2', state.stalling2);
    renderDots('p1', state.penalties1);
    renderDots('p2', state.penalties2);
    var total = state.mode==='womens'?3:5;
    var div = state.mode==='womens'?"Women's 3-on-3":state.mode==='supermatch'?'Supermatch':"Men's Quintet";
    document.getElementById('matchLabel').textContent = state.mode==='supermatch'?'Supermatch':'Match '+state.matchNum+' of '+total+' — '+div;
    document.body.className = state.mode==='supermatch'?'supermatch':'';
    renderTimer();
  }

  function renderTimer() {
    var m=Math.floor(state.timerSeconds/60), s=state.timerSeconds%60;
    var el=document.getElementById('timer');
    if(el) {
      el.textContent=m+':'+s.toString().padStart(2,'0');
      el.className='timer'+(state.timerSeconds<=10?' danger':'');
    }
  }

  function renderDots(id, count) {
    var container = document.getElementById(id);
    if(!container) return;
    var dots=container.children;
    for (var i=0;i<4;i++) { if(dots[i]) { dots[i].className='dot'; if(i<count) dots[i].classList.add(count===4&&i===3?'dq':'active'); } }
  }

  function hexRgba(hex, a) {
    if (!hex||!hex.startsWith('#')) return 'rgba(128,128,128,'+a+')';
    var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    return 'rgba('+r+','+g+','+b+','+a+')';
  }

  connectWS();        

  setInterval(function() {
    if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'ping' }));
  }, 25000);
</script>
</body>
</html>
