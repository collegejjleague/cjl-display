<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CJL Mat 1 Display</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100vw;height:100vh;background:#111;font-family:'Barlow Condensed',sans-serif;color:#fff;overflow:hidden;}
.wrapper{width:100%;height:100%;display:flex;flex-direction:column;padding:16px 20px;gap:8px;}
.top-bar{display:flex;align-items:center;justify-content:space-between;}
.logo-area{display:flex;align-items:center;gap:12px;}
.logo-area img{height:48px;opacity:0.85;}
.mat-label{font-size:16px;font-weight:600;color:#666;letter-spacing:3px;text-transform:uppercase;font-family:'Barlow',sans-serif;}
.match-label{text-align:center;font-size:18px;font-weight:600;color:#888;letter-spacing:3px;text-transform:uppercase;font-family:'Barlow',sans-serif;}
.timer{text-align:center;font-size:120px;font-weight:900;letter-spacing:8px;line-height:1;color:#fff;transition:color 0.3s;}
.timer.danger{color:#e24b4a;}
.scores-row{display:grid;grid-template-columns:1fr 70px 1fr;gap:14px;align-items:stretch;flex:1;}
.athlete-card{background:#1e1e1e;border-radius:14px;padding:24px 30px;display:flex;flex-direction:column;justify-content:space-between;}
.athlete-card.right{align-items:flex-end;}
.school-name{font-size:18px;font-weight:500;color:#888;letter-spacing:2px;text-transform:uppercase;font-family:'Barlow',sans-serif;margin-bottom:6px;}
.athlete-name{font-size:52px;font-weight:900;color:#fff;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;}
.points-box{font-size:130px;font-weight:900;line-height:1;width:180px;text-align:center;border-radius:14px;padding:12px 0;}
.points-red{background:#c0392b;color:#fff;}.points-blue{background:#1a5fa8;color:#fff;}
.indicators{margin-top:16px;display:flex;flex-direction:column;gap:12px;}
.indicator-row{display:flex;align-items:center;gap:12px;}
.indicator-row.right{flex-direction:row-reverse;}
.indicator-label{font-size:14px;color:#666;letter-spacing:1.5px;text-transform:uppercase;font-family:'Barlow',sans-serif;min-width:70px;}
.strike-dots{display:flex;gap:10px;}
.dot{width:26px;height:26px;border-radius:50%;border:3px solid #333;background:transparent;transition:all 0.2s;}
.dot.active{background:#f5a623;border-color:#f5a623;}.dot.dq{background:#e24b4a;border-color:#e24b4a;}
.vs-center{display:flex;align-items:center;justify-content:center;font-size:28px;color:#333;font-weight:700;}
.divider{height:1px;background:#222;}
.team-scores{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.team-score-card{border-radius:12px;padding:18px 28px;display:flex;align-items:center;justify-content:space-between;}
.team-score-card.left{background:rgba(170,0,0,0.15);border:1px solid rgba(170,0,0,0.4);}
.team-score-card.right{background:rgba(0,53,107,0.15);border:1px solid rgba(0,53,107,0.4);}
.team-name{font-size:26px;font-weight:700;color:#ccc;text-transform:uppercase;letter-spacing:1px;}
.team-pts{font-size:64px;font-weight:900;}
.team-pts.red{color:#e24b4a;}.team-pts.blue{color:#4a90d9;}
body.supermatch .team-scores,body.supermatch .divider{display:none;}
.connection-status{font-size:10px;color:#444;letter-spacing:1px;text-transform:uppercase;}
</style>
</head>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwp2W4G2mYd5cC2e9xBgJ3S_q_3jypZiCpaxI0iF5_1f5XbdLKQQyO65OGZbBScXlddcw/exec';
  const RELAY_URL = 'wss://cjl-relay.onrender.com';
  const matId = 1;

  document.getElementById('matLabel').textContent = 'Mat 1';

  let state = {mode:'mens',matchNum:1,pts1:0,pts2:0,stalling1:0,stalling2:0,penalties1:0,penalties2:0,teamPts1:0,teamPts2:0,timerSeconds:300,timerRunning:false,name1:'—',school1:'—',color1:'#AA0000',name2:'—',school2:'—',color2:'#00356B'};
  let timerInterval = null;
  let lastTimerRunning = false;
  let lastTimerSeconds = 300;

  let ws = null;
  let wsConnected = false;
  let sheetPollInterval = null;

  function stopSheetPolling() {
    if (sheetPollInterval) {
      clearInterval(sheetPollInterval);
      sheetPollInterval = null;
    }
  }

  function startSheetPolling() {
    // Only allow spreadsheet fallback if WebSocket is completely disconnected
    if (!sheetPollInterval && !wsConnected) {
      sheetPollInterval = setInterval(pollSheet, 3000); // 3 second fallback intervals
    }
  }

  function connectWS() {
    try {
      ws = new WebSocket(RELAY_URL);
      ws.onopen = function() {
        wsConnected = true;
        ws.send(JSON.stringify({ type: 'join', mat: matId }));
        stopSheetPolling(); // WebSocket is alive, KILL the spreadsheet loop completely
        document.getElementById('connStatus').style.color = '#3d5af1'; // Blue = Real-time WebSocket
      };
      ws.onmessage = function(e) {
        try { 
          var d = JSON.parse(e.data); 
          if (d.type === 'state') applyState(d); 
        } catch(err) {}
      };
      ws.onclose = function() {
        wsConnected = false;
        document.getElementById('connStatus').style.color = '#e24b4a'; // Red = Disconnected
        startSheetPolling(); // Bring back spreadsheet as emergency backup
        setTimeout(connectWS, 3000);
      };
      ws.onerror = function() {
        wsConnected = false;
        startSheetPolling();
        setTimeout(connectWS, 3000);
      };
    } catch(e) {
      wsConnected = false;
      startSheetPolling();
      setTimeout(connectWS, 3000);
    }
  }

  // Sheets backup fallback loop
  async function pollSheet() {
    if (wsConnected) return; // Hard stop: Do absolutely nothing if WebSocket is working
    try {
      const res = await fetch(SHEET_URL + '?action=getMatch&mat=' + matId, {redirect:'follow'});
      const data = JSON.parse(await res.text());
      applyState(data);
      document.getElementById('connStatus').style.color = '#27ae60'; // Green = Fallback mode active
    } catch(e) {}
  }

  // localStorage (instant updates if control panel is open on the same computer)
  window.addEventListener('storage', function(e) {
    if (e.key === 'cjl_mat_' + matId) {
      try { applyState(JSON.parse(e.newValue)); } catch(err) {}
    }
  });

  function applyState(data) {
    if (data.name1 !== undefined) state.name1 = data.name1;
    if (data.name2 !== undefined) state.name2 = data.name2;
    if (data.school1 !== undefined) state.school1 = data.school1;
    if (data.school2 !== undefined) state.school2 = data.school2;
    if (data.color1 !== undefined) state.color1 = data.color1;
    if (data.color2 !== undefined) state.color2 = data.color2;
    if (data.pts1 !== undefined) state.pts1 = parseInt(data.pts1)||0;
    if (data.pts2 !== undefined) state.pts2 = parseInt(data.pts2)||0;
    if (data.teamPts1 !== undefined) state.teamPts1 = parseInt(data.teamPts1)||0;
    if (data.teamPts2 !== undefined) state.teamPts2 = parseInt(data.teamPts2)||0;
    if (data.stalling1 !== undefined) state.stalling1 = parseInt(data.stalling1)||0;
    if (data.stalling2 !== undefined) state.stalling2 = parseInt(data.stalling2)||0;
    if (data.penalties1 !== undefined) state.penalties1 = parseInt(data.penalties1)||0;
    if (data.penalties2 !== undefined) state.penalties2 = parseInt(data.penalties2)||0;
    if (data.mode !== undefined) state.mode = data.mode;
    if (data.matchNum !== undefined) state.matchNum = parseInt(data.matchNum)||1;
    
    // TIMER FIX: Always trust the incoming data over the WebSocket rather than checking Math.abs differences
    if (data.timerSeconds !== undefined) {
      state.timerSeconds = parseInt(data.timerSeconds)||300;
    }
    
    var nr = data.timerRunning==='true'||data.timerRunning===true;
    if (nr !== lastTimerRunning) { 
      lastTimerRunning = nr; 
      if (nr) startTimer(); else stopTimer(); 
    }
    render();
  }

  function startTimer() {
    if (timerInterval) return;
    timerInterval = setInterval(function() {
      if (state.timerSeconds > 0) { state.timerSeconds--; renderTimer(); }
      else { clearInterval(timerInterval); timerInterval=null; }
    }, 1000);
  }

  function stopTimer() { clearInterval(timerInterval); timerInterval=null; }

  function render() {
    document.getElementById('name1').textContent = state.name1;
    document.getElementById('name2').textContent = state.name2;
    document.getElementById('school1').textContent = state.school1;
    document.getElementById('school2').textContent = state.school2;
    document.getElementById('pts1').textContent = state.pts1;
    document.getElementById('pts2').textContent = state.pts2;
    document.getElementById('tn1').textContent = state.school1;
    document.getElementById('tn2').textContent = state.school2;
    document.getElementById('tp1').textContent = state.teamPts1;
    document.getElementById('tp2').textContent = state.teamPts2;
    document.getElementById('tc1').style.background = hexRgba(state.color1, 0.12);
    document.getElementById('tc1').style.borderColor = hexRgba(state.color1, 0.3);
    document.getElementById('tc2').style.background = hexRgba(state.color2, 0.12);
    document.getElementById('tc2').style.borderColor = hexRgba(state.color2, 0.3);
    renderDots('s1', state.stalling1);
    renderDots('s2', state.stalling2);
    renderDots('p1', state.penalties1);
    renderDots('p2', state.penalties2);
    var total = state.mode==='womens'?3:5;
    var div = state.mode==='womens'?"Women's 3-on-3":state.mode==='supermatch'?'Supermatch':"Men's Quintet";
    document.getElementById('matchLabel').textContent = state.mode==='supermatch'?'Supermatch':'Match '+state.matchNum+' of '+total+' — '+div;
    document.body.className = state.mode==='supermatch'?'supermatch':'';
    renderTimer();
  }

  function renderTimer() {
    var m=Math.floor(state.timerSeconds/60), s=state.timerSeconds%60;
    var el=document.getElementById('timer');
    el.textContent=m+':'+s.toString().padStart(2,'0');
    el.className='timer'+(state.timerSeconds<=10?' danger':'');
  }

  function renderDots(id, count) {
    var dots=document.getElementById(id).children;
    for (var i=0;i<4;i++) { dots[i].className='dot'; if(i<count) dots[i].classList.add(count===4&&i===3?'dq':'active'); }
  }

  function hexRgba(hex, a) {
    if (!hex||!hex.startsWith('#')) return 'rgba(128,128,128,'+a+')';
    var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    return 'rgba('+r+','+g+','+b+','+a+')';
  }

  // Pure WebSocket-First Initialization
  // We do NOT call pollSheet() here anymore. We let the control board push the initial data.
  connectWS();

  // Keepalive ping every 25 seconds to prevent Render dropping the connection
  setInterval(function() {
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({ type: 'ping' }));
    }
  }, 25000);
