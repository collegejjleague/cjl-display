<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SUPERMATCHES</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1920px;height:1080px;background:#0f1117;font-family:'Barlow Condensed',sans-serif;color:#fff;overflow:hidden;}
.wrapper{width:100%;height:100%;display:flex;flex-direction:column;padding:28px 40px;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.header-left{display:flex;align-items:center;gap:16px;}
.header img{height:48px;opacity:0.9;}
.header-title{font-size:26px;font-weight:900;letter-spacing:3px;}
.header-sub{font-size:14px;color:#8890aa;letter-spacing:2px;text-transform:uppercase;font-family:'Barlow',sans-serif;}
.bracket-container{flex:1;display:flex;align-items:stretch;gap:0;position:relative;}
.round{display:flex;flex-direction:column;justify-content:space-around;min-width:260px;gap:0;position:relative;z-index:2;}
.round-label{font-size:11px;color:#8890aa;letter-spacing:2px;text-transform:uppercase;font-family:'Barlow',sans-serif;text-align:center;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid #2e3350;}
.bout{background:#3d455e;border:1px solid #2e3350;border-radius:8px;padding:0;overflow:hidden;margin:6px 0;transition:border-color 0.3s;min-width:240px;}
.bout.complete{border-color:#27ae60;}
.bout-header{font-size:9px;color:#8890aa;letter-spacing:1.5px;text-transform:uppercase;padding:6px 12px 4px;font-family:'Barlow',sans-serif;background:#16182a;}
.bout-team{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-top:1px solid #22263a;}
.bout-team.winner{background:rgba(39,174,96,0.1);}
.bout-team-name{font-size:16px;font-weight:700;color:#ccc;}
.bout-team-name.winner{color:#fff;font-weight:900;}
.bout-team-name.tbd{color:#555;font-style:italic;font-weight:400;}
.bout-team-score{font-size:18px;font-weight:900;color:#fff;min-width:24px;text-align:right;}
.result-tag{font-size:9px;color:#27ae60;letter-spacing:1px;padding:4px 12px;text-transform:uppercase;font-family:'Barlow',sans-serif;border-top:1px solid #22263a;}
.champion-box{background:linear-gradient(135deg,#1a2a4a,#2c3e6b);border:2px solid #3d5af1;border-radius:12px;padding:20px 28px;text-align:center;margin:auto 0;}
.champion-trophy{font-size:32px;margin-bottom:6px;}
.champion-label{font-size:11px;color:#8890aa;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;}
.champion-name{font-size:24px;font-weight:900;}
.place-box{background:#1a1d27;border:1px solid #2e3350;border-radius:8px;padding:14px 20px;text-align:center;margin:auto 0;}
.place-label{font-size:10px;color:#8890aa;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px;}
.place-name{font-size:18px;font-weight:700;color:#ccc;}
.conn{position:relative;min-width:40px;display:flex;flex-direction:column;justify-content:space-around;}
/* Supermatches layout */
.super-grid{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:40px;align-items:center;}
.super-card{background:#1a1d27;border:1px solid #2e3350;border-radius:12px;overflow:hidden;}
.super-card.complete{border-color:#27ae60;}
.super-title{font-size:11px;color:#8890aa;letter-spacing:2px;text-transform:uppercase;padding:12px 16px 8px;background:#16182a;font-family:'Barlow',sans-serif;}
.super-team{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-top:1px solid #22263a;}
.super-team.winner{background:rgba(39,174,96,0.1);}
.super-team-name{font-size:22px;font-weight:700;color:#ccc;}
.super-team-name.winner{color:#fff;font-weight:900;}
.super-team-name.tbd{color:#555;font-style:italic;font-weight:400;}
.super-team-score{font-size:28px;font-weight:900;color:#fff;}
.super-result{font-size:10px;color:#27ae60;letter-spacing:1px;padding:8px 16px;text-transform:uppercase;font-family:'Barlow',sans-serif;border-top:1px solid #22263a;}
</style>
</head>

<script>

const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwp2W4G2mYd5cC2e9xBgJ3S_q_3jypZiCpaxI0iF5_1f5XbdLKQQyO65OGZbBScXlddcw/exec';

const RELAY_URL = 'wss://cjl-relay.onrender.com';
let bracketWs = null;
let bracketWsConnected = false;
let sheetPollInterval = null;

function connectBracketWS() {
  try {
    bracketWs = new WebSocket(RELAY_URL);
    bracketWs.onopen = function() {
      bracketWsConnected = true;
      bracketWs.send(JSON.stringify({ type: 'join', channel: 'bracket' }));
      // Relay connected — stop Sheets polling, relay pushes updates instead
      if (sheetPollInterval) { clearInterval(sheetPollInterval); sheetPollInterval = null; }
    };
    bracketWs.onmessage = function(e) {
      try {
        var d = JSON.parse(e.data);
        if (d.type === 'bracket' && d.data) {
          allBouts = d.data;
          renderBracket();
        }
      } catch(err) {}
    };
    bracketWs.onclose = function() {
      bracketWsConnected = false;
      if (!sheetPollInterval) sheetPollInterval = setInterval(loadBracket, 10000);
      setTimeout(connectBracketWS, 3000);
    };
    bracketWs.onerror = function() {
      bracketWsConnected = false;
      if (!sheetPollInterval) sheetPollInterval = setInterval(loadBracket, 10000);
      setTimeout(connectBracketWS, 3000);
    };
  } catch(e) {
    bracketWsConnected = false;
    if (!sheetPollInterval) sheetPollInterval = setInterval(loadBracket, 10000);
    setTimeout(connectBracketWS, 3000);
  }
}

// Keepalive ping every 25 seconds
setInterval(function() {
  if (bracketWs && bracketWs.readyState === 1) {
    bracketWs.send(JSON.stringify({ type: 'ping' }));
  }
}, 25000);

const ROUNDS = [];
const TITLE = 'SUPERMATCHES';
const PLACE_LABEL = '';
const IS_CHAMP = false;
const IS_SUPER = true;

let allBouts = [];

async function loadBracket() {
  try {
    const res = await fetch(SHEET_URL + '?action=getBracket', {redirect:'follow'});
    allBouts = JSON.parse(await res.text());
    renderBracket();
  } catch(e) {
    document.getElementById('bracket').innerHTML = '<div style="color:#e24b4a;font-size:18px;margin:auto;">Connection error — retrying...</div>';
  }
}

function renderBracket() {
  document.getElementById('title').textContent = TITLE;
  const container = document.getElementById('bracket');
  container.innerHTML = '';

  if (IS_SUPER) {
    renderSupermatches(container);
    return;
  }

  container.style.display = 'flex';
  container.style.alignItems = 'stretch';

  ROUNDS.forEach((round, ri) => {
    if (ri > 0) {
      const conn = document.createElement('div');
      conn.className = 'conn';
      conn.style.minWidth = '50px';
      container.appendChild(conn);
    }
    const col = document.createElement('div');
    col.className = 'round';
    col.style.flex = '1';
    const label = document.createElement('div');
    label.className = 'round-label';
    label.textContent = round.label;
    col.appendChild(label);
    round.bouts.forEach(boutName => {
      const bout = allBouts.find(b => b.bout === boutName);
      col.appendChild(makeBoutCard(bout, boutName));
    });
    container.appendChild(col);
  });

  // Final placement box
  const finalRound = ROUNDS[ROUNDS.length - 1];
  const finalBout = allBouts.find(b => b.bout === finalRound.bouts[0]);
  if (finalBout && finalBout.winner) {
    const conn = document.createElement('div');
    conn.className = 'conn';
    conn.style.minWidth = '50px';
    container.appendChild(conn);
    const placeCol = document.createElement('div');
    placeCol.className = 'round';
    placeCol.style.flex = '0.6';
    placeCol.style.justifyContent = 'center';
    if (IS_CHAMP) {
      placeCol.innerHTML = `<div class="champion-box"><div class="champion-trophy">🏆</div><div class="champion-label">Champion</div><div class="champion-name">${finalBout.winner}</div></div>`;
    } else {
      placeCol.innerHTML = `<div class="place-box"><div class="place-label">${PLACE_LABEL}</div><div class="place-name">${finalBout.winner} wins</div></div>`;
    }
    container.appendChild(placeCol);
  }
}

function renderSupermatches(container) {
  container.className = 'super-grid';
  ['Super 1','Super 2','Super 3'].forEach(boutName => {
    const bout = allBouts.find(b => b.bout === boutName);
    container.appendChild(makeSuperCard(bout, boutName));
  });
}

function makeSuperCard(bout, boutName) {
  const card = document.createElement('div');
  card.className = 'super-card' + (bout && bout.status==='Complete' ? ' complete' : '');
  const t1 = bout ? bout.team1 : 'TBD';
  const t2 = bout ? bout.team2 : 'TBD';
  const s1 = bout && bout.team1Score ? bout.team1Score : '';
  const s2 = bout && bout.team2Score ? bout.team2Score : '';
  const w  = bout ? bout.winner : '';
  const tbd1 = !t1 || t1==='TBD' || t1.startsWith('W-') || t1.startsWith('L-');
  const tbd2 = !t2 || t2==='TBD' || t2.startsWith('W-') || t2.startsWith('L-');
  card.innerHTML = `
    <div class="super-title">${boutName}</div>
    <div class="super-team${w===t1?' winner':''}">
      <span class="super-team-name${w===t1?' winner':''}${tbd1?' tbd':''}">${t1||'TBD'}</span>
      <span class="super-team-score">${s1}</span>
    </div>
    <div class="super-team${w===t2?' winner':''}">
      <span class="super-team-name${w===t2?' winner':''}${tbd2?' tbd':''}">${t2||'TBD'}</span>
      <span class="super-team-score">${s2}</span>
    </div>
    ${bout && bout.status==='Complete' ? `<div class="super-result">✓ ${w} wins</div>` : ''}
  `;
  return card;
}

function makeBoutCard(bout, boutName) {
  const card = document.createElement('div');
  card.className = 'bout' + (bout && bout.status==='Complete' ? ' complete' : '');
  const t1 = bout ? bout.team1 : 'TBD';
  const t2 = bout ? bout.team2 : 'TBD';
  const s1 = bout && bout.team1Score ? bout.team1Score : '';
  const s2 = bout && bout.team2Score ? bout.team2Score : '';
  const w  = bout ? bout.winner : '';
  const tbd1 = !t1 || t1==='TBD' || t1.startsWith('W-') || t1.startsWith('L-');
  const tbd2 = !t2 || t2==='TBD' || t2.startsWith('W-') || t2.startsWith('L-');
  card.innerHTML = `
    <div class="bout-header">${boutName}</div>
    <div class="bout-team${w===t1?' winner':''}">
      <span class="bout-team-name${w===t1?' winner':''}${tbd1?' tbd':''}">${t1||'TBD'}</span>
      <span class="bout-team-score">${s1}</span>
    </div>
    <div class="bout-team${w===t2?' winner':''}">
      <span class="bout-team-name${w===t2?' winner':''}${tbd2?' tbd':''}">${t2||'TBD'}</span>
      <span class="bout-team-score">${s2}</span>
    </div>
    ${bout && bout.status==='Complete' ? `<div class="result-tag">✓ ${w} wins</div>` : ''}
  `;
  return card;
}

loadBracket();
connectBracketWS();

</script>
</body>
</html>
