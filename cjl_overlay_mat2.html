  <div class="el" id="bar2" style="background: rgb(0, 53, 107);"></div>
  <div class="el" id="team1_bg" style="background: rgb(170, 0, 0);"></div>
  <div class="el" id="team2_bg" style="background: rgb(0, 53, 107);"></div>
  <div class="el" id="team1_name">Harvard</div>
  <div class="el" id="team1_score">0</div>
  <div class="el" id="team2_name">Yale</div>
  <div class="el" id="team2_score">0</div>
  <div class="el" id="pts_red">0</div>
  <div class="el" id="pts_blue">0</div>
  <div class="el" id="name1">J. Smith</div>
  <div class="el" id="school1">Harvard</div>
  <div class="el" id="name2">J. Smith</div>
  <div class="el" id="school2">Yale</div>
  <div class="el" id="timer">5:00</div>
  <div class="el" id="match_counter">Match 1 of 5</div>

<script>
  const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwp2W4G2mYd5cC2e9xBgJ3S_q_3jypZiCpaxI0iF5_1f5XbdLKQQyO65OGZbBScXlddcw/exec';
  const RELAY_URL = 'wss://cjl-relay.onrender.com';
  const matId = 2;

  

  const state = { mode:'mens', matchNum:1, pts1:0, pts2:0, teamPts1:0, teamPts2:0, timerSeconds:300, timerRunning:false, name1:'—', school1:'—', color1:'#AA0000', name2:'—', school2:'—', color2:'#00356B', stalling1:0, stalling2:0, penalties1:0, penalties2:0 };
  let timerInterval = null;
  let lastTimerRunning = false;
  let lastTimerSeconds = 300;

  // WebSocket primary transport
  let ws = null;
  let wsConnected = false;
  let sheetPollInterval = null;

  function connectWS() {
    try {
      ws = new WebSocket(RELAY_URL);
      ws.onopen = function() {
        wsConnected = true;
        ws.send(JSON.stringify({ type: 'join', mat: matId }));
        if (sheetPollInterval) { clearInterval(sheetPollInterval); sheetPollInterval = null; }
        
      };
      ws.onmessage = function(e) {
        try { var d = JSON.parse(e.data); if (d.type === 'state') applyState(d); } catch(err) {}
      };
      ws.onclose = function() {
        wsConnected = false;
        if (!sheetPollInterval) sheetPollInterval = setInterval(pollSheet, 2000);
        setTimeout(connectWS, 3000);
      };
      ws.onerror = function() {
        wsConnected = false;
        if (!sheetPollInterval) sheetPollInterval = setInterval(pollSheet, 2000);
        setTimeout(connectWS, 3000);
      };
    } catch(e) {
      wsConnected = false;
      if (!sheetPollInterval) sheetPollInterval = setInterval(pollSheet, 2000);
      setTimeout(connectWS, 3000);
    }
  }

  // Sheets fallback
  async function pollSheet() {
    try {
      const res = await fetch(SHEET_URL + '?action=getMatch&mat=' + matId, {redirect:'follow'});
      const data = JSON.parse(await res.text());
      applyState(data);
      
    } catch(e) {
      
    }
  }

  // localStorage (instant, same machine)
  window.addEventListener('storage', function(e) {
    if (e.key === 'cjl_mat_' + matId) {
      try { applyState(JSON.parse(e.newValue)); } catch(err) {}
    }
  });

  function applyState(data) {
    if (data.name1 !== undefined) state.name1 = data.name1;
    if (data.name2 !== undefined) state.name2 = data.name2;
    if (data.school1 !== undefined) state.school1 = data.school1;
    if (data.school2 !== undefined) state.school2 = data.school2;
    if (data.color1 !== undefined) state.color1 = data.color1;
    if (data.color2 !== undefined) state.color2 = data.color2;
    if (data.pts1 !== undefined) state.pts1 = parseInt(data.pts1)||0;
    if (data.pts2 !== undefined) state.pts2 = parseInt(data.pts2)||0;
    if (data.teamPts1 !== undefined) state.teamPts1 = parseInt(data.teamPts1)||0;
    if (data.teamPts2 !== undefined) state.teamPts2 = parseInt(data.teamPts2)||0;
    if (data.mode !== undefined) state.mode = data.mode;
    if (data.matchNum !== undefined) state.matchNum = parseInt(data.matchNum)||1;
    var ns = parseInt(data.timerSeconds)||300;
    var nr = data.timerRunning==='true'||data.timerRunning===true;
    if (Math.abs(ns - lastTimerSeconds) > 1) { state.timerSeconds=ns; } lastTimerSeconds=ns;
    if (nr !== lastTimerRunning) { lastTimerRunning=nr; if (nr) startTimer(); else stopTimer(); }
    render();
  }
  function startTimer() {
    if (timerInterval) return;
    timerInterval = setInterval(function() {
      if (state.timerSeconds > 0) { state.timerSeconds--; renderTimer(); }
      else { clearInterval(timerInterval); timerInterval=null; }
    }, 1000);
  }
  function stopTimer() { clearInterval(timerInterval); timerInterval=null; }
  
  // Auto-scale athlete name font size to fit the box width.
  // Measures text width using a canvas (independent of flex/overflow layout).
  var __measureCanvas = null;
  function measureTextWidth(text, fontSize, fontWeight, fontFamily, letterSpacing) {
    if (!__measureCanvas) __measureCanvas = document.createElement('canvas');
    var ctx = __measureCanvas.getContext('2d');
    ctx.font = fontWeight + ' ' + fontSize + 'px ' + fontFamily;
    var base = ctx.measureText(text).width;
    // Approximate letter-spacing contribution (applied between characters)
    var extra = letterSpacing * Math.max(0, text.length - 1);
    return base + extra;
  }
  function autoScaleName(id, text) {
    var el = document.getElementById(id);
    var maxFont = 37;
    var minFont = 18;
    var boxWidth = 290.17;
    var width = measureTextWidth(text || '', maxFont, '900', "'Barlow Condensed', sans-serif", 1.5);
    if (width > boxWidth) {
      var scale = boxWidth / width;
      var newSize = Math.max(minFont, Math.floor(maxFont * scale));
      el.style.fontSize = newSize + 'px';
    } else {
      el.style.fontSize = maxFont + 'px';
    }
  }

  function render() {
    document.getElementById('name1').textContent = state.name1;
    document.getElementById('name2').textContent = state.name2;
    autoScaleName('name1', state.name1);
    autoScaleName('name2', state.name2);
    document.getElementById('school1').textContent = state.school1;
    document.getElementById('school2').textContent = state.school2;
    document.getElementById('bar1').style.background = state.color1;
    document.getElementById('bar2').style.background = state.color2;
    document.getElementById('team1_bg').style.background = state.color1;
    document.getElementById('team2_bg').style.background = state.color2;
    document.getElementById('team1_name').textContent = state.school1;
    document.getElementById('team2_name').textContent = state.school2;
    document.getElementById('pts_red').textContent = state.pts1;
    document.getElementById('pts_blue').textContent = state.pts2;
    document.getElementById('team1_score').textContent = state.teamPts1;
    document.getElementById('team2_score').textContent = state.teamPts2;
    var total = state.mode==='womens'?3:5;
    document.getElementById('match_counter').textContent =
      state.mode==='supermatch' ? 'Supermatch' : 'Match '+state.matchNum+' of '+total;
    renderTimer();
    document.body.className = state.mode==='supermatch'?'supermatch':'';
  }
  function renderTimer() {
    var m=Math.floor(state.timerSeconds/60), s=state.timerSeconds%60;
    var el=document.getElementById('timer');
    el.textContent = m+':'+s.toString().padStart(2,'0');
    el.className = 'el'+(state.timerSeconds<=10?' danger':'');
  }
  render();

  // Boot: start sheet poll immediately, then connect WS (stops poll when ready)
  sheetPollInterval = setInterval(pollSheet, 2000);
  pollSheet();
  connectWS();

  // Keepalive ping every 25 seconds to prevent Render dropping the connection
  setInterval(function() {
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({ type: 'ping' }));
    }
  }, 25000);

</script>
