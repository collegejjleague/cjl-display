<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CJL 2-Mat Overlay (Mats 1 & 2)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:1920px; height:1080px;
  background:transparent !important;
  overflow:hidden;
}
#bg {
  position:absolute; top:0; left:0;
  width:1920px; height:1080px;
  pointer-events:none;
}
.el {
  position:absolute;
  display:flex;
  pointer-events:none;
}
.danger { color:#e24b4a !important; }
.stroke-black {
  text-shadow:
    -1px -1px 0 #000,
     1px -1px 0 #000,
    -1px  1px 0 #000,
     1px  1px 0 #000;
}

/* ===== double-slash accent (SVG, two parallel diagonal bars) ===== */
.slash-svg {
  position:absolute; top:88px; width:46px; height:81px;
  pointer-events:none;
}
.slash-flip { transform: scaleX(-1); }

/* ===== TOP BAR : team names + circle scores ===== */
.top-name {
  top:84px; height:90px;
  font-weight:900; color:#fff;
  font-family:'Barlow Condensed', sans-serif;
  align-items:center; white-space:nowrap; overflow:hidden;
  letter-spacing:0.5px;
}
.top-score {
  top:83px; height:90px; font-size:64px;
  font-weight:900; color:#fff;
  font-family:'Barlow Condensed', sans-serif;
  align-items:center; justify-content:center;
}
.match-counter {
  top:187px; height:33px; font-size:32px;
  font-weight:600; color:#fff;
  font-family:'Barlow', sans-serif; letter-spacing:0.5px;
  align-items:center; justify-content:center;
}

/* ===== BOTTOM BAR : athlete name / school / timer / bar / pts ===== */
.athlete-name {
  top:885px; height:35px;
  font-weight:900; color:#fff;
  font-family:'Barlow Condensed', sans-serif;
  align-items:center; white-space:nowrap; overflow:hidden;
  letter-spacing:0.5px;
}
.athlete-school {
  top:918px; height:22px; font-size:14px;
  font-weight:500; color:#bbb;
  font-family:'Barlow', sans-serif; letter-spacing:2px; text-transform:uppercase;
  align-items:center; white-space:nowrap; overflow:hidden;
}
.athlete-bar {
  top:946px; height:6px;
}
.pts-circle {
  top:890px; height:58px; font-size:58px;
  font-weight:900; color:#fff;
  font-family:'Barlow Condensed', sans-serif;
  align-items:center; justify-content:center;
}
.timer {
  top:885px; height:55px; font-size:57px;
  font-weight:900; color:#fff;
  font-family:'Barlow Condensed', sans-serif; letter-spacing:1px;
  align-items:center; justify-content:center;
}
</style>

const RELAY_URL = 'wss://cjl-relay.onrender.com';

function makeMat(matId) {
  const p = 'm' + matId + '_';
  const state = { mode:'mens', matchNum:1, pts1:0, pts2:0, teamPts1:0, teamPts2:0,
    timerSeconds:300, timerRunning:false,
    name1:'—', school1:'—', color1:'#AA0000',
    name2:'—', school2:'—', color2:'#00356B',
    stalling1:0, stalling2:0, penalties1:0, penalties2:0 };
  let timerInterval = null;
  let lastTimerRunning = false;
  let lastTimerSeconds = 300;
  let ws = null;
  let sheetPollInterval = null;

  function autoScaleName(id, text, maxFont, minFont, boxWidth) {
    var el = document.getElementById(id);
    if (!window.__measureCanvas) window.__measureCanvas = document.createElement('canvas');
    var ctx = window.__measureCanvas.getContext('2d');
    ctx.font = '900 ' + maxFont + "px 'Barlow Condensed', sans-serif";
    var t = text || '';
    var width = ctx.measureText(t).width + 1.5 * Math.max(0, t.length - 1);
    if (width > boxWidth) {
      var scale = boxWidth / width;
      el.style.fontSize = Math.max(minFont, Math.floor(maxFont * scale)) + 'px';
    } else {
      el.style.fontSize = maxFont + 'px';
    }
  }

  function render() {
    document.getElementById(p+'name1').textContent = state.school1;
    document.getElementById(p+'name2').textContent = state.school2;
    var n1w = matId===1 ? 250 : 260;
    var n2w = matId===1 ? 225 : 245;
    autoScaleName(p+'name1', state.school1, 50, 20, n1w);
    autoScaleName(p+'name2', state.school2, 50, 20, n2w);
    document.getElementById(p+'score1').textContent = state.teamPts1;
    document.getElementById(p+'score2').textContent = state.teamPts2;
    document.getElementById(p+'slash1').style.color = state.color1;
    document.getElementById(p+'slash2').style.color = state.color2;

    document.getElementById(p+'name_a').textContent = state.name1;
    document.getElementById(p+'school_a').textContent = state.school1;
    document.getElementById(p+'bar_a').style.background = state.color1;
    document.getElementById(p+'name_b').textContent = state.name2;
    document.getElementById(p+'school_b').textContent = state.school2;
    document.getElementById(p+'bar_b').style.background = state.color2;
    autoScaleName(p+'name_a', state.name1, 30, 16, 220);
    autoScaleName(p+'name_b', state.name2, 30, 16, 230);
    document.getElementById(p+'pts_red').textContent = state.pts1;
    document.getElementById(p+'pts_blue').textContent = state.pts2;

    var total = state.mode==='womens'?3:5;
    var counterText = state.mode==='supermatch' ? 'Supermatch' : 'Match '+state.matchNum+' of '+total;
    document.getElementById(p+'match_counter').textContent = counterText;

    var isSuper = state.mode==='supermatch';
    ['slash1','name1','score1','slash2','name2','score2'].forEach(function(k){
      document.getElementById(p+k).style.display = isSuper ? 'none' : (k.indexOf('slash')===0 ? 'block' : 'flex');
    });

    renderTimer();
  }

  function renderTimer() {
    var m=Math.floor(state.timerSeconds/60), s=state.timerSeconds%60;
    var el=document.getElementById(p+'timer');
    el.textContent = m+':'+s.toString().padStart(2,'0');
    el.className = 'el timer stroke-black' + (state.timerSeconds<=10?' danger':'');
  }

  function startTimer() {
    if (timerInterval) return;
    timerInterval = setInterval(function() {
      if (state.timerSeconds > 0) { state.timerSeconds--; renderTimer(); }
      else { clearInterval(timerInterval); timerInterval=null; }
    }, 1000);
  }
  function stopTimer() { clearInterval(timerInterval); timerInterval=null; }

  function applyState(data) {
    if (data.name1 !== undefined) state.name1 = data.name1;
    if (data.name2 !== undefined) state.name2 = data.name2;
    if (data.school1 !== undefined) state.school1 = data.school1;
    if (data.school2 !== undefined) state.school2 = data.school2;
    if (data.color1 !== undefined) state.color1 = data.color1;
    if (data.color2 !== undefined) state.color2 = data.color2;
    if (data.pts1 !== undefined) state.pts1 = parseInt(data.pts1)||0;
    if (data.pts2 !== undefined) state.pts2 = parseInt(data.pts2)||0;
    if (data.teamPts1 !== undefined) state.teamPts1 = parseInt(data.teamPts1)||0;
    if (data.teamPts2 !== undefined) state.teamPts2 = parseInt(data.teamPts2)||0;
    if (data.mode !== undefined) state.mode = data.mode;
    if (data.matchNum !== undefined) state.matchNum = parseInt(data.matchNum)||1;
    var ns = parseInt(data.timerSeconds)||300;
    var nr = data.timerRunning==='true'||data.timerRunning===true;
    if (Math.abs(ns - lastTimerSeconds) > 1) { state.timerSeconds=ns; } lastTimerSeconds=ns;
    if (nr !== lastTimerRunning) { lastTimerRunning=nr; if (nr) startTimer(); else stopTimer(); }
    render();
  }

  function connectWS() {
    try {
      ws = new WebSocket(RELAY_URL);
      ws.onopen = function() {
        ws.send(JSON.stringify({ type: 'join', mat: matId }));
        if (sheetPollInterval) { clearInterval(sheetPollInterval); sheetPollInterval = null; }
      };
      ws.onmessage = function(e) {
        try { var d = JSON.parse(e.data); if (d.type === 'state') applyState(d); } catch(err) {}
      };
      ws.onclose = function() {
        if (!sheetPollInterval) sheetPollInterval = setInterval(pollSheet, 2000);
        setTimeout(connectWS, 3000);
      };
      ws.onerror = function() {
        if (!sheetPollInterval) sheetPollInterval = setInterval(pollSheet, 2000);
        setTimeout(connectWS, 3000);
      };
    } catch(e) {
      if (!sheetPollInterval) sheetPollInterval = setInterval(pollSheet, 2000);
      setTimeout(connectWS, 3000);
    }
  }

  async function pollSheet() {
    try {
      const res = await fetch(SHEET_URL + '?action=getMatch&mat=' + matId, {redirect:'follow'});
      const data = JSON.parse(await res.text());
      applyState(data);
    } catch(e) {}
  }

  window.addEventListener('storage', function(e) {
    if (e.key === 'cjl_mat_' + matId) {
      try { applyState(JSON.parse(e.newValue)); } catch(err) {}
    }
  });

  render();
  sheetPollInterval = setInterval(pollSheet, 2000);
  pollSheet();
  connectWS();
  setInterval(function() {
    if (ws && ws.readyState === 1) { ws.send(JSON.stringify({ type: 'ping' })); }
  }, 25000);
}

makeMat(1);
makeMat(2);
</script>
