<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CJL — Be Right Back</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1920px;height:1080px;background:#0a0d14;font-family:'Barlow Condensed',sans-serif;color:#fff;overflow:hidden;}

/* Animated background */
.bg-grid {
  position:absolute;inset:0;
  background-image:linear-gradient(#1a2a4a22 1px,transparent 1px),linear-gradient(90deg,#1a2a4a22 1px,transparent 1px);
  background-size:60px 60px;
  animation:gridMove 20s linear infinite;
}
@keyframes gridMove {from{background-position:0 0;}to{background-position:60px 60px;}}

/* Gradient overlays */
.bg-glow {
  position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 60% at 20% 50%,#1a2a4a44 0%,transparent 70%),radial-gradient(ellipse 60% 60% at 80% 50%,#2c3e6b33 0%,transparent 70%);
}

/* Top accent line */
.accent-line {position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,#3d5af1,transparent);}

/* Main content */
.content {position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;}

/* Logo */
.logo-wrap {display:flex;align-items:center;gap:20px;}
.logo-wrap img {height:340px;filter:drop-shadow(0 0 50px rgba(61,90,241,0.5));animation:logoPulse 3s ease-in-out infinite;}
@keyframes logoPulse {0%,100%{filter:drop-shadow(0 0 20px rgba(61,90,241,0.4));opacity:0.9;}50%{filter:drop-shadow(0 0 40px rgba(61,90,241,0.8));opacity:1;}}

/* Main text */
.main-text {
  font-size:80px;font-weight:900;letter-spacing:8px;
  background:linear-gradient(135deg,#ffffff,#8890aa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-align:center;
}
.sub-text {
  font-size:28px;font-weight:400;letter-spacing:4px;color:#8890aa;
  text-transform:uppercase;font-family:'Barlow',sans-serif;
}

/* Animated dots */
.dots {display:flex;gap:12px;}
.dot {width:10px;height:10px;border-radius:50%;background:#3d5af1;animation:dotPulse 1.4s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:0.2s;}.dot:nth-child(3){animation-delay:0.4s;}
@keyframes dotPulse {0%,80%,100%{transform:scale(0.6);opacity:0.4;}40%{transform:scale(1);opacity:1;}}

/* Bottom bar */
.bottom-bar {
  position:absolute;bottom:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,#1a2a4a,#3d5af1,#1a2a4a);
  background-size:200% 100%;
  animation:barMove 3s linear infinite;
}
@keyframes barMove{from{background-position:200% 0;}to{background-position:-200% 0;}}

/* Event name */
.event-name {font-size:22px;color:#4a5568;letter-spacing:3px;text-transform:uppercase;font-family:'Barlow',sans-serif;}

/* Corner CJL text */
.corner {position:absolute;bottom:24px;right:40px;font-size:14px;color:#2e3350;letter-spacing:3px;font-weight:700;}
</style>
</head>
